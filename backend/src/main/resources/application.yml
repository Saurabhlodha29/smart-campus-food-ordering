ml:
  service:
    # URL of the Python FastAPI demand-score microservice
    url: http://localhost:8000

    # Set true once the ML service is running.
    # When false, PenaltyService uses the rule-based Java fallback only.
    enabled: true

    # Max time to wait for a response from the ML service (milliseconds).
    # Keep this SHORT — penalty processing is time-sensitive.
    timeout-ms: 3000

